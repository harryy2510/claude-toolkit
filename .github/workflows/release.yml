name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-native:
    name: Build native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-13
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-2025
        include:
          - os: macos-14
            target_key: darwin-arm64
          - os: macos-13
            target_key: darwin-x64
          - os: ubuntu-24.04
            target_key: linux-x64
          - os: ubuntu-24.04-arm
            target_key: linux-arm64
          - os: windows-2025
            target_key: win32-x64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun test

      - run: cargo test

      - name: Build native binary
        env:
          AGENT_TOOLKIT_TARGET: ${{ matrix.target_key }}
        run: bun run build:native

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target_key }}
          path: bin/native/${{ matrix.target_key }}

  publish:
    name: Publish package
    needs: build-native
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - uses: actions/download-artifact@v4
        with:
          path: bin/native
          merge-multiple: false

      - name: Normalize native artifact layout
        run: |
          set -eu
          for artifact in bin/native/native-*; do
            target="${artifact#bin/native/native-}"
            mkdir -p "bin/native/$target"
            cp -R "$artifact"/. "bin/native/$target/"
            rm -rf "$artifact"
          done

      - run: bun install

      - run: bun test

      - run: cargo test

      - run: bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
