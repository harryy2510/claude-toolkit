name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.claude-plugin/**'
      - 'AGENTS.md'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'README.md'
      - 'bin/**'
      - 'bun.lock'
      - 'crates/**'
      - 'package.json'
      - 'scripts/**'
      - 'src/**'
      - 'test/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-24.04
    outputs:
      release_sha: ${{ steps.version.outputs.release_sha }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: oven-sh/setup-bun@v2

      - name: Resolve next patch version
        id: version
        run: |
          set -eu
          version="$(bun -e "const pkg = await Bun.file('package.json').json(); const parts = String(pkg.version).split('.').map(Number); if (parts.length !== 3 || parts.some(Number.isNaN)) throw new Error('package.json version must be x.y.z'); parts[2] += 1; console.log(parts.join('.'))")"
          tag="v${version}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Release tag ${tag} already exists"
            exit 1
          fi
          echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build-native:
    name: Build native (${{ matrix.os }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-14
          - macos-15-intel
          - ubuntu-24.04
          - ubuntu-24.04-arm
        include:
          - os: macos-14
            target_key: darwin-arm64
          - os: macos-15-intel
            target_key: darwin-x64
          - os: ubuntu-24.04
            target_key: linux-x64
          - os: ubuntu-24.04-arm
            target_key: linux-arm64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Apply release version
        run: bun scripts/bump-version.ts ${{ needs.prepare.outputs.version }}

      - run: bun install

      - run: bun test

      - run: cargo test

      - name: Build native binary
        env:
          AGENT_TOOLKIT_TARGET: ${{ matrix.target_key }}
        run: bun run build:native

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.target_key }}
          path: bin/native/${{ matrix.target_key }}

  publish:
    name: Publish package
    needs:
      - prepare
      - build-native
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.release_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - name: Apply release version
        run: |
          set -eu
          git switch -c main
          bun scripts/bump-version.ts "${{ needs.prepare.outputs.version }}"

      - uses: actions/download-artifact@v7
        with:
          path: bin/native
          merge-multiple: false

      - name: Normalize native artifact layout
        run: |
          set -eu
          for artifact in bin/native/native-*; do
            target="${artifact#bin/native/native-}"
            mkdir -p "bin/native/$target"
            cp -R "$artifact"/. "bin/native/$target/"
            rm -rf "$artifact"
          done

      - run: bun install

      - run: bun test

      - run: cargo test

      - run: bun publish --access public --no-git-checks
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump and tag release
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json Cargo.toml Cargo.lock
          git commit -m "chore(release): ${{ needs.prepare.outputs.tag }} [skip ci]"
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ needs.prepare.outputs.tag }}"
