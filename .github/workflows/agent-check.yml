name: Agent Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  agent-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run check

      - run: bun run build:native

      - run: bun bin/agent-toolkit.ts repo check
